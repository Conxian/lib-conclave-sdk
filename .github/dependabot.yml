version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: "UTC"
    target-branch: master
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - security

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "05:30"
      timezone: "UTC"
    target-branch: master
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - github_actions
